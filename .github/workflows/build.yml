name: Build DarioKMP

run-name: >-
  ${{ github.event.inputs.target == 'ios'
      && format('Build iOS Framework ({0}, {1})', github.event.inputs.build_type, github.event.inputs.slice)
      || format('Publish Android Library ({0})', github.event.inputs.build_type) }}

# Manual trigger only — no automatic builds on push/PR.
# iOS XCFramework and Android/RN publish are separate targets.
#
# Runners:
#   build-ios : macos-latest  — macOS 15, Apple Silicon (M1/M2/M3), 7GB RAM, 3 CPUs.
#               Required for Xcode toolchain (XCFramework native binary linking).
#               Xcode 26 is selected explicitly — macos-latest ships multiple versions.
#   publish   : ubuntu-latest — Ubuntu 22.04, 16GB RAM, 4 CPUs, 2-3× faster provisioning.
#               Publishing KMP klibs + Android AAR to Maven does NOT need macOS.
#               KMP klibs are Kotlin IR — cross-compiled on Linux, no Xcode linker needed.
#
# Action versions (all Node.js 24 native — v5 releases):
#   actions/checkout@v5, actions/setup-java@v5, actions/cache@v5,
#   actions/upload-artifact@v5, gradle/actions/setup-gradle@v5

on:
  workflow_dispatch:
    inputs:
      target:
        description: "ios → XCFramework for iOS/RN-iOS | publish → GitHub Packages for Android/RN-Android"
        required: true
        default: "ios"
        type: choice
        options:
          - ios
          - publish
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
      slice:
        description: "device-only → iosArm64 only (physical device / TestFlight / App Store, ~30% faster) | all → iosArm64 + iosSimulatorArm64 (full XCFramework for simulator too)"
        required: true
        default: "device-only"
        type: choice
        options:
          - device-only
          - all

jobs:
  # ─── iOS XCFramework ────────────────────────────────────────────────────────
  # device-only: single-slice XCFramework — iosArm64 (physical iPhone/iPad arm64).
  #              Use for physical device testing, TestFlight, and App Store.
  #              ~30% faster: skips simulator compilation entirely.
  # all:         two-slice XCFramework — iosArm64 + iosSimulatorArm64.
  #              Use when developers also need to run in Xcode simulator.
  #
  # NOTE: iosX64 (Intel Mac simulator) is NOT included — Compose Multiplatform 1.11.x
  # dropped iosX64. Intel Mac users: set EXCLUDED_ARCHS[sdk=iphonesimulator*] = x86_64
  # in Xcode build settings to run the ARM64 slice via Rosetta 2.
  build-ios:
    name: "Build iOS Framework (${{ github.event.inputs.build_type }}, ${{ github.event.inputs.slice }})"
    if: ${{ github.event.inputs.target == 'ios' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      # Pin Xcode 26 (latest-stable) — macos-latest ships multiple Xcode versions
      # and may not default to 26. KMP Kotlin/Native uses the active Xcode SDK for
      # framework linking, so the version here directly affects the output binary.
      - name: Select Xcode (latest stable ≥ 26)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Kotlin/Native toolchain (~500 MB).
      # Without this it re-downloads on every run — saves 5-10 min.
      # Key includes Kotlin version via libs.versions.toml so a version bump
      # busts the cache and pulls the matching toolchain automatically.
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      # Caches ~/.gradle (downloaded deps + Gradle home).
      # Combined with --build-cache, unchanged modules are not recompiled.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      # Override gradle.properties Xmx (8192M) — macOS runners only have 7GB.
      # Cap Kotlin daemon at 6GB; leave 1GB headroom for OS + Xcode toolchain.
      - name: Build XCFramework
        env:
          GRADLE_OPTS: "-Dkotlin.daemon.jvmargs=-Xmx6144M -XX:+UseG1GC -XX:MaxMetaspaceSize=512M"
        run: |
          BUILD="${{ github.event.inputs.build_type }}"
          SLICE="${{ github.event.inputs.slice }}"

          # Capitalize first letter: debug → Debug, release → Release
          BUILD_CAP="$(echo "$BUILD" | awk '{print toupper(substr($0,1,1)) substr($0,2)}')"

          # Both modes use assembleSharedXCFramework.
          # device-only: passes -PdeviceOnly so build.gradle.kts excludes iosSimulatorArm64.
          # all:         no flag → both iosArm64 + iosSimulatorArm64 are compiled.
          DEVICE_FLAG=""
          if [ "$SLICE" == "device-only" ]; then
            DEVICE_FLAG="-PdeviceOnly"
          fi

          ./gradlew :shared:assembleShared${BUILD_CAP}XCFramework \
            ${DEVICE_FLAG} \
            -Pkotlin.native.parallelThreads=1 \
            --build-cache \
            --no-daemon \
            --stacktrace

      - name: Verify XCFramework slices
        run: |
          XCFW="shared/build/XCFrameworks/${{ github.event.inputs.build_type }}/Shared.xcframework"

          echo "── Xcode version ──"
          xcodebuild -version

          echo ""
          echo "── XCFramework contents ──"
          ls -la "$XCFW"

          # Determine expected slices based on selected option
          SLICES=("ios-arm64")
          if [ "${{ github.event.inputs.slice }}" == "all" ]; then
            SLICES+=("ios-arm64-simulator")
          fi

          echo ""
          for slice in "${SLICES[@]}"; do
            if [ -d "$XCFW/$slice" ]; then
              echo "✅  $slice"
            else
              echo "❌  $slice — MISSING"
              exit 1
            fi
          done

          echo ""
          echo "All ${#SLICES[@]} slice(s) present. XCFramework is valid."

          # Print binary info to confirm arm64 architecture
          echo ""
          echo "── Binary architecture ──"
          file "$XCFW/ios-arm64/Shared.framework/Shared" 2>/dev/null || true

      - name: Upload XCFramework
        uses: actions/upload-artifact@v5
        with:
          name: Shared-XCFramework-${{ github.event.inputs.build_type }}-${{ github.event.inputs.slice }}
          path: shared/build/XCFrameworks/${{ github.event.inputs.build_type }}/Shared.xcframework
          retention-days: 14

      - name: Summary
        run: |
          SLICE="${{ github.event.inputs.slice }}"
          XCODE_VER=$(xcodebuild -version | head -1)

          echo "### iOS XCFramework ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build type** | \`${{ github.event.inputs.build_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Slice** | \`${SLICE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Xcode** | ${XCODE_VER} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Runner** | \`macos-latest\` (Apple Silicon) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$SLICE" == "device-only" ]; then
            echo "**Slices included:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`ios-arm64\` — physical iPhone/iPad ✅" >> $GITHUB_STEP_SUMMARY
            echo "- \`ios-arm64-simulator\` — not included (device-only build)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Slices included:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`ios-arm64\` — physical iPhone/iPad ✅" >> $GITHUB_STEP_SUMMARY
            echo "- \`ios-arm64-simulator\` — Apple Silicon Mac simulator (M1/M2/M3) ✅" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Intel Mac users:** Add \`EXCLUDED_ARCHS[sdk=iphonesimulator*] = x86_64\` in Xcode build settings to run the ARM64 slice via Rosetta 2." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**How to use:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download \`Shared-XCFramework-${{ github.event.inputs.build_type }}-${SLICE}\` from artifacts above" >> $GITHUB_STEP_SUMMARY
          echo "2. Remove old \`Shared.xcframework\` from Xcode project" >> $GITHUB_STEP_SUMMARY
          echo "3. Drag new \`Shared.xcframework\` into Xcode → set to **Embed & Sign**" >> $GITHUB_STEP_SUMMARY
          echo "4. Clean build folder (Cmd+Shift+K) and build" >> $GITHUB_STEP_SUMMARY

  # ─── Publish to GitHub Packages ─────────────────────────────────────────────
  # Android native + React Native Android consume com.dario.kmp:shared via Gradle.
  # debug → version 1.0.0-debug (development/testing)
  # release → version 1.0.0 (production)
  #
  # Runs on ubuntu-latest: 16GB RAM / 4 CPUs / faster provisioning vs macOS 7GB / 3 CPUs.
  # KMP Maven publications (Android AAR + Kotlin/Native klibs) compile cross-platform —
  # no Xcode linker needed. macOS is only required for XCFramework binary linking.
  publish:
    name: Publish Android Library
    if: ${{ github.event.inputs.target == 'publish' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # Cache Kotlin/Native toolchain — needed to compile iOS klibs (Kotlin IR, not native binary).
      # Linux uses the x86_64 variant of the toolchain (~400 MB).
      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set version suffix for debug builds
        if: ${{ github.event.inputs.build_type == 'debug' }}
        # Note: Linux sed uses -i without trailing '' (macOS requires sed -i '')
        run: sed -i 's/^version = .*/version = "1.0.0-debug"/' shared/build.gradle.kts

      # ubuntu-latest has 16GB RAM — raise Kotlin daemon ceiling from 6GB (macOS cap) to 10GB.
      # Gradle process itself is capped by org.gradle.jvmargs in gradle.properties (4GB).
      - name: Publish to GitHub Packages
        env:
          GRADLE_OPTS: "-Dkotlin.daemon.jvmargs=-Xmx10240M -XX:+UseG1GC -XX:MaxMetaspaceSize=512M"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ./gradlew :shared:publish \
            -Pkotlin.native.parallelThreads=2 \
            --build-cache \
            --no-daemon \
            --stacktrace

      - name: Summary
        run: |
          VERSION=$(grep '^version = ' shared/build.gradle.kts | sed "s/version = //;s/\"//g")
          echo "### Published to GitHub Packages ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Coordinates:** \`com.dario.kmp:shared:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`https://maven.pkg.github.com/krishna-dario/dario-kmp\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Consume in Android / React Native Android:**" >> $GITHUB_STEP_SUMMARY
          echo '```groovy' >> $GITHUB_STEP_SUMMARY
          echo "implementation 'com.dario.kmp:shared:${VERSION}'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
