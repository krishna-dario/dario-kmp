name: Build DarioKMP

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
          - publish
      build_type:
        description: "Build type (ignored for publish)"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  # ─── iOS XCFramework ────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS XCFramework (${{ github.event.inputs.build_type }})
    if: ${{ github.event.inputs.target == 'ios' || github.event.inputs.target == 'both' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ github.event.inputs.build_type }} XCFramework
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew :shared:assembleSharedReleaseXCFramework
          else
            ./gradlew :shared:assembleSharedDebugXCFramework
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Shared-XCFramework-${{ github.event.inputs.build_type }}
          path: shared/build/XCFrameworks/${{ github.event.inputs.build_type }}/Shared.xcframework
          retention-days: 14

  # ─── Android AAR ────────────────────────────────────────────────────────────
  build-android:
    name: Build Android AAR (${{ github.event.inputs.build_type }})
    if: ${{ github.event.inputs.target == 'android' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build ${{ github.event.inputs.build_type }} AAR
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew :shared:assembleSharedReleaseXCFramework --continue || true
            ./gradlew :shared:publish -Pkotlin.internal.mpp.allowMultiplatformPublicationsOnUnsupportedHost=true --dry-run 2>/dev/null || true
          fi
          ./gradlew :shared:compileKotlinAndroid

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: Shared-AAR-${{ github.event.inputs.build_type }}
          path: shared/build/outputs/aar/
          retention-days: 14

  # ─── Publish to GitHub Packages ─────────────────────────────────────────────
  publish:
    name: Publish to GitHub Packages
    if: ${{ github.event.inputs.target == 'publish' }}
    runs-on: macos-latest  # macOS required for Kotlin/Native targets

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: ./gradlew :shared:publish

      - name: Summary
        run: |
          echo "### Published ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`com.dario.kmp:shared:1.0.0\`" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** https://maven.pkg.github.com/krishna-dario/dario-kmp" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Add to Android project's repositories:" >> $GITHUB_STEP_SUMMARY
          echo '```groovy' >> $GITHUB_STEP_SUMMARY
          echo 'maven {' >> $GITHUB_STEP_SUMMARY
          echo '    url = uri("https://maven.pkg.github.com/krishna-dario/dario-kmp")' >> $GITHUB_STEP_SUMMARY
          echo '    credentials {' >> $GITHUB_STEP_SUMMARY
          echo '        username = gp_user' >> $GITHUB_STEP_SUMMARY
          echo '        password = gp_token' >> $GITHUB_STEP_SUMMARY
          echo '    }' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
