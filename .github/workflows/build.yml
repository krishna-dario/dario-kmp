name: Build DarioKMP

on:
  workflow_dispatch:
    inputs:
      target:
        description: "ios → XCFramework | publish → GitHub Packages (Android + RN Android)"
        required: true
        default: "publish"
        type: choice
        options:
          - ios
          - publish
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  # iOS native + React Native iOS
  # Download the XCFramework artifact and embed it in Xcode
  build-ios:
    name: Build iOS XCFramework (${{ github.event.inputs.build_type }})
    if: ${{ github.event.inputs.target == 'ios' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build XCFramework
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew :shared:assembleSharedReleaseXCFramework
          else
            ./gradlew :shared:assembleSharedDebugXCFramework
          fi

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: Shared-XCFramework-${{ github.event.inputs.build_type }}
          path: shared/build/XCFrameworks/${{ github.event.inputs.build_type }}/Shared.xcframework
          retention-days: 14

  # Android native + React Native Android
  # Publishes com.dario.kmp:shared to GitHub Packages
  # debug → for development/testing, release → for production builds
  publish:
    name: Publish to GitHub Packages (${{ github.event.inputs.build_type }})
    if: ${{ github.event.inputs.target == 'publish' }}
    runs-on: macos-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Set version suffix for debug builds
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: |
          sed -i '' 's/^version = .*/version = "1.0.0-debug"/' shared/build.gradle.kts

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: ./gradlew :shared:publish
