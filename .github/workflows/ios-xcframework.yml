name: Build iOS XCFramework

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-xcframework:
    runs-on: macos-latest   # GitHub's macOS runner has Xcode pre-installed

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug XCFramework
        run: ./gradlew :shared:assembleSharedDebugXCFramework

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shared-XCFramework-debug
          path: shared/build/XCFrameworks/debug/Shared.xcframework
          retention-days: 7
